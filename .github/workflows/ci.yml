name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Set to true to run integration tests'
        required: false
        default: 'false'

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install pytest httpx
      - name: Run unit tests
        working-directory: backend
        run: pytest -q tests

  integration-tests:
    name: Integration tests (manual)
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration == 'true'
    env:
      RUN_INTEGRATION_TESTS: '1'
      POSTGRES_CONNECTION: ${{ secrets.POSTGRES_CONNECTION }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install pytest httpx
      - name: Run integration tests
        working-directory: backend
        run: pytest -q tests/integration
