services:
  - type: web
    name: my-pg-backend
    env: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: POSTGRES_CONNECTION
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_HOURS
        value: 8
      - key: CLIENT_ORIGIN
        sync: false

  - type: web
    name: my-pg-frontend
    env: node
    plan: free
    buildCommand: "cd frontend-react && npm install && npm run build"
    startCommand: "cd frontend-react && npm run preview -- --host 0.0.0.0"
    envVars:
      - key: VITE_API_BASE
        value: https://my-pg-backend.onrender.com
